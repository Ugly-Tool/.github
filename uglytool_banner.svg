<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="ugly // tool — dress the tool. fix the face.">
  <defs>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#2A2A2A" opacity="0.65"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#0D0D0D"/>
  <rect width="1200" height="500" fill="url(#dots)"/>

  <!-- Diagonal slashes -->
  <g fill="#C4823C">
    <polygon points="140,500 230,500 360,0 270,0"/>
    <polygon points="320,500 410,500 540,0 450,0"/>
  </g>

  <!-- Main wordmark -->
  <text x="590" y="260"
        font-family="'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="88" letter-spacing="-1">
    <tspan fill="#EAE3D2">ugly </tspan><tspan fill="#C4823C">// </tspan><tspan fill="#EAE3D2">tool</tspan>
  </text>

  <!-- Tagline -->
  <text x="592" y="305"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-style="italic" font-weight="400" font-size="24" fill="#8F8D87">
    dress the tool. fix the face.
  </text>

  <!-- Feature line -->
  <text x="592" y="390"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-weight="600" font-size="16" fill="#C4823C" letter-spacing="2.8">
    •  THREE LOOKS  •  ONE-TIME PRICE  •  YOURS FOREVER
  </text>
</svg>
