<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ugly // tool — your tool works. it just looks ugly.</title>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ede6d6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0ede6" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="warmspot" cx="15%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c17f3a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f0ede6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Parchment base -->
  <rect width="1200" height="280" fill="url(#glow)"/>
  <rect width="1200" height="280" fill="url(#warmspot)"/>

  <!-- Left accent bar — amber -->
  <rect x="0" y="0" width="4" height="280" fill="#c17f3a" opacity="0.8"/>

  <!-- Background // watermark -->
  <text x="72" y="200" font-family="Georgia, serif" font-size="180"
        font-weight="bold" fill="#c17f3a" opacity="0.06" letter-spacing="-4">//</text>

  <!-- Wordmark -->
  <text x="600" y="148"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="bold" letter-spacing="-1"
        fill="#c17f3a" text-anchor="middle" dominant-baseline="middle">
    <tspan>ugly </tspan><tspan font-size="48" font-weight="normal" opacity="0.45">//</tspan><tspan font-size="72" font-weight="bold"> tool</tspan>
  </text>

  <!-- Rule -->
  <line x1="300" y1="186" x2="900" y2="186" stroke="#c17f3a" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="600" y="214"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" font-weight="normal" letter-spacing="2.5"
        fill="#8a7060" text-anchor="middle" font-style="italic">
    your tool works. it just looks ugly.
  </text>

  <!-- URL -->
  <text x="1160" y="252" font-family="Arial, sans-serif"
        font-size="11" letter-spacing="1.5" fill="#9a8070"
        text-anchor="end">uglytool.dev</text>

  <!-- Right accent bar -->
  <rect x="1196" y="0" width="4" height="280" fill="#c17f3a" opacity="0.3"/>

</svg>
