<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ugly // tool — your tool works. it just looks ugly.</title>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#242220" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a1917" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="warmspot" cx="15%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c17f3a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a1917" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#glow)"/>
  <rect width="1200" height="280" fill="url(#warmspot)"/>
  <rect x="0" y="0" width="4" height="280" fill="#c17f3a" opacity="0.7"/>

  <text x="80" y="168" font-family="Georgia, serif" font-size="96" font-weight="bold" fill="#c17f3a" opacity="0.08" letter-spacing="-4">//</text>

  <!-- Wordmark as single centered text with tspans -->
  <text x="600" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#c17f3a" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1">
    <tspan>ugly </tspan><tspan font-size="40" font-weight="normal" opacity="0.5">//</tspan><tspan> tool</tspan>
  </text>

  <!-- Rule and tagline both centered at x=600 -->
  <line x1="300" y1="186" x2="900" y2="186" stroke="#c17f3a" stroke-width="0.8" opacity="0.25"/>

  <text x="600" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="normal" letter-spacing="2.5" fill="#8a8278" text-anchor="middle" font-style="italic">your tool works. it just looks ugly.</text>

  <text x="1160" y="252" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#5a5650" text-anchor="end">uglytool.dev</text>
  <rect x="1196" y="0" width="4" height="280" fill="#c17f3a" opacity="0.3"/>

</svg>
